<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusTimer Pro ⏱️</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Focus<span>Timer</span></h1>
        <p>Técnica Pomodoro</p>
      </header>

      <main class="timer-display">
        <span id="minutos">25</span><span class="dois-pontos">:</span
        ><span id="segundos">00</span>
      </main>

      <div class="controles">
        <button id="btn-iniciar" class="btn-play">▶ Iniciar</button>
        <button id="btn-pausar" class="btn-pause">⏸ Pausar</button>
        <button id="btn-zerar" class="btn-stop">⏹ Zerar</button>
      </div>
    </div>
  </body>
</html>
