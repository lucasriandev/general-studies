<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch 🎬</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Cine<span>Match</span></h1>
        <p>Sua lista de filmes para assistir</p>

        <form id="form-filme">
          <input
            type="text"
            id="input-filme"
            placeholder="Nome do filme (Ex: Matrix)"
          />
          <button type="submit">Adicionar</button>
        </form>
      </header>

      <main>
        <div class="grid-filmes" id="lista-filmes"></div>
      </main>
    </div>
  </body>
</html>
